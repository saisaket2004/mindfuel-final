<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFuel Initialization</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <main style="background: var(--surface); backdrop-filter: blur(20px); padding: 2.5rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1.5rem;">
        <div style="text-align: center;">
            <h1 style="margin: 0; font-size: 2rem; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><i class="fa-solid fa-dna" style="color:var(--primary);"></i> MindFuel</h1>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Initialize your profile</p>
        </div>
        
        {% if error %}
            <div style="background: rgba(239,68,68,0.2); color: #fca5a5; padding: 10px; border-radius: 8px; text-align: center; font-size: 0.9rem;">
                {{ error }}
            </div>
        {% endif %}
        
        <form action="/register" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="color: #94a3b8; font-size: 0.9rem;">Identifier</label>
                <input type="text" name="username" style="width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color:white; padding:12px; border-radius:12px;" required>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="color: #94a3b8; font-size: 0.9rem;">Passcode</label>
                <input type="password" name="password" style="width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color:white; padding:12px; border-radius:12px;" required>
            </div>
            
            <button type="submit" class="btn-primary" style="margin-top: 10px;">Initialize</button>
        </form>
        
        <div style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted);">
            Existing profile? <a href="/login" style="color: var(--primary); text-decoration: none;">Authenticate</a>
        </div>
    </main>
</body>
</html>
