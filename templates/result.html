<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Report | MindFuel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
</head>
<body class="{{ stress_level }}"> <nav class="navbar">
        <div class="brand"><i class="fa-solid fa-dna"></i> MindFuel</div>
        <a href="/" class="nav-pill"><i class="fa-solid fa-xmark"></i> Exit</a>
    </nav>

    <div class="fade-in" style="max-width:800px; margin:0 auto; padding:8rem 2rem 4rem; text-align:center;">
        
        <div style="width:200px; height:200px; border-radius:50%; margin:0 auto 2rem; display:flex; flex-direction:column; justify-content:center; align-items:center; background:rgba(255,255,255,0.03); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); box-shadow:0 0 60px rgba(0,0,0,0.5);">
            <span style="font-size:0.85rem; text-transform:uppercase; color:#94a3b8; letter-spacing:2px;">Detected Level</span>
            <span style="font-size:3rem; font-family:'Outfit'; font-weight:700;">{{ stress_level }}</span>
        </div>

        <div style="background:var(--surface); backdrop-filter:blur(12px); border-radius:24px; padding:3rem; border:1px solid rgba(255,255,255,0.08); text-align:left;">
            <h2 style="margin-bottom:1rem;">Clinical Assessment</h2>
            <p style="font-size:1.1rem; color:#94a3b8; line-height:1.6;">{{ message }}</p>

            <div style="background:rgba(99,102,241,0.08); border:1px solid rgba(99,102,241,0.2); border-radius:16px; padding:2rem; margin-top:2rem; display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap;">
                <div>
                    <span style="font-size:0.8rem; text-transform:uppercase; color:#818cf8; letter-spacing:1px; font-weight:600;">Prescribed Intervention</span>
                    <h2 style="margin:5px 0;">{{ game_title }}</h2>
                    <p style="margin:0; color:#94a3b8; font-size:0.9rem;">Goal: {{ therapy_goal }}</p>
                </div>
                <a href="/play/{{ game_link }}" class="btn-primary" style="margin:0; width:auto; padding:12px 30px;">
                    Begin Intervention <i class="fa-solid fa-arrow-right" style="margin-left:8px;"></i>
                </a>
            </div>
        </div>
    </div>
    
    <style>
        .High h2, .High span { color: #ef4444 !important; }
        .Medium h2, .Medium span { color: #f59e0b !important; }
        .Low h2, .Low span { color: #10b981 !important; }
        /* Reset button colors */
        .btn-primary h2, .btn-primary span { color: white !important; }
    </style>
</body>
</html>
