<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetic Release | Stress Relief</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #0a0e27;
            font-family: 'Outfit', sans-serif;
            cursor: crosshair;
        }

        body.dragging {
            cursor: grabbing !important;
        }

        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            touch-action: none;
        }

        .hud-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 39, .9);
            backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 20px;
            border: 1px solid rgba(248, 113, 113, .25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
            z-index: 10;
            max-width: 290px;
        }

        .hud-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .hud-icon {
            font-size: 1.7rem;
        }

        .hud-title {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f87171, #fb923c, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-subtitle {
            font-size: .76rem;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: rgba(0, 0, 0, .35);
            padding: 11px;
            border-radius: 11px;
            border: 1px solid rgba(255, 255, 255, .06);
            text-align: center;
        }

        .stat-value {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fb923c, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 3px;
        }

        .stat-label {
            font-size: .66rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .5px;
            font-weight: 600;
        }

        .tension-section {
            background: rgba(0, 0, 0, .22);
            padding: 12px;
            border-radius: 11px;
            border: 1px solid rgba(248, 113, 113, .2);
        }

        .tension-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .tension-label {
            font-size: .7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .tension-pct {
            font-size: 1rem;
            font-weight: 700;
            color: #f87171;
        }

        .tension-bar {
            height: 9px;
            background: rgba(255, 255, 255, .06);
            border-radius: 9px;
            overflow: hidden;
        }

        .tension-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #fbbf24, #f87171);
            width: 0%;
            transition: width .4s ease;
            border-radius: 9px;
        }

        .release-msg {
            margin-top: 9px;
            padding: 7px;
            background: rgba(16, 185, 129, .1);
            border-radius: 8px;
            border: 1px solid rgba(16, 185, 129, .2);
            text-align: center;
        }

        .release-text {
            font-size: .76rem;
            color: #34d399;
            font-weight: 600;
        }

        .smash-hint {
            margin-top: 7px;
            text-align: center;
            font-size: .7rem;
            color: #64748b;
        }

        .control-panel {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 9px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 16px;
        }

        .control-btn {
            background: rgba(10, 14, 39, .9);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(248, 113, 113, .3);
            color: #fca5a5;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: .86rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all .25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: rgba(239, 68, 68, .2);
            border-color: #ef4444;
            color: #fff;
            transform: translateY(-2px);
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #f87171, #fb923c);
            border: none;
            color: #fff;
        }

        .control-btn.primary:hover {
            background: linear-gradient(135deg, #ef4444, #f97316);
            transform: translateY(-2px);
        }

        .mode-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 14, 39, .9);
            backdrop-filter: blur(16px);
            padding: 6px;
            border-radius: 50px;
            border: 1px solid rgba(248, 113, 113, .2);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: .82rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all .25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-btn:hover {
            color: #94a3b8;
            background: rgba(255, 255, 255, .06);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #f87171, #fb923c);
            color: #fff;
        }

        .flash-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at var(--fx, 50%) var(--fy, 50%), rgba(251, 146, 60, .45) 0%, rgba(248, 113, 113, .18) 30%, transparent 60%);
            opacity: 0;
            pointer-events: none;
            transition: opacity .08s ease-out;
            z-index: 5;
        }

        .message-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(.8);
            background: rgba(10, 14, 39, .97);
            backdrop-filter: blur(28px);
            padding: 42px;
            border-radius: 26px;
            border: 2px solid rgba(251, 146, 60, .4);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all .45s cubic-bezier(.34, 1.56, .64, 1);
            z-index: 100;
            max-width: 460px;
        }

        .message-modal.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        .modal-icon {
            font-size: 3.2rem;
            margin-bottom: 14px;
            display: block;
        }

        .modal-title {
            font-size: 1.7rem;
            font-weight: 700;
            color: #fb923c;
            margin-bottom: 12px;
        }

        .modal-text {
            font-size: .93rem;
            color: #cbd5e1;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .modal-close {
            background: linear-gradient(135deg, #f87171, #fb923c);
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: .86rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
        }

        .achievement-toast {
            position: fixed;
            top: 100px;
            right: -380px;
            background: linear-gradient(135deg, rgba(10, 14, 39, .97), rgba(26, 11, 46, .97));
            backdrop-filter: blur(18px);
            padding: 16px 24px;
            border-radius: 18px;
            border: 1.5px solid rgba(251, 146, 60, .5);
            transition: right .55s cubic-bezier(.34, 1.56, .64, 1);
            z-index: 50;
            min-width: 270px;
        }

        .achievement-toast.show {
            right: 20px;
        }

        .toast-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .toast-icon {
            font-size: 2rem;
        }

        .toast-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fb923c;
        }

        .toast-desc {
            font-size: .8rem;
            color: #94a3b8;
            margin-left: 44px;
        }

        .combo-display {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 4rem;
            font-weight: 900;
            color: #fb923c;
            text-shadow: 0 0 40px rgba(251, 146, 60, 1), 0 4px 8px rgba(0, 0, 0, .8);
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            transition: all .4s cubic-bezier(.34, 1.56, .64, 1);
        }

        .combo-display.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .instruction-tooltip {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 39, .93);
            backdrop-filter: blur(14px);
            padding: 13px 24px;
            border-radius: 16px;
            border: 1.5px solid rgba(251, 146, 60, .3);
            color: #cbd5e1;
            font-size: .88rem;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease;
            z-index: 20;
        }

        .instruction-tooltip.show {
            opacity: 1;
        }

        @media (max-width:768px) {
            .hud-container {
                top: 8px;
                left: 8px;
                padding: 12px;
                max-width: 230px;
            }

            .mode-selector {
                top: 8px;
                right: 8px;
            }

            .control-panel {
                bottom: 8px;
            }

            .control-btn {
                padding: 10px 14px;
                font-size: .76rem;
            }
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <div class="flash-overlay" id="flashOverlay"></div>

    <div class="hud-container">
        <div class="hud-header">
            <div class="hud-icon">💥</div>
            <div class="hud-title">Kinetic Release</div>
        </div>
        <div class="hud-subtitle">Smash blocks to release stress. They collide with each other too!</div>
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="impactCounter">0</div>
                <div class="stat-label">Impacts</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="shatterCounter">0</div>
                <div class="stat-label">Releases</div>
            </div>
        </div>
        <div class="tension-section">
            <div class="tension-header">
                <div class="tension-label">Tension Released</div>
                <div class="tension-pct"><span id="tensionPct">0</span>%</div>
            </div>
            <div class="tension-bar">
                <div class="tension-fill" id="tensionFill"></div>
            </div>
        </div>
        <div class="release-msg">
            <div class="release-text" id="releaseMsg">Spawn a block to begin</div>
        </div>
        <div class="smash-hint">💡 5 hits = shatter • Throw blocks into each other!</div>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" id="catharcticBtn"><i class="fas fa-fire"></i> Cathartic</button>
        <button class="mode-btn" id="zenBtn"><i class="fas fa-spa"></i> Zen</button>
    </div>

    <div class="control-panel">
        <button class="control-btn primary" id="spawnBtn"><i class="fas fa-cube"></i> Spawn Block</button>
        <button class="control-btn" id="spawn5Btn"><i class="fas fa-layer-group"></i> Spawn 5</button>
        <button class="control-btn" id="clearBtn"><i class="fas fa-broom"></i> Clear All</button>
        <button class="control-btn" id="soundBtn"><i class="fas fa-volume-high"></i> Sound</button>
    </div>

    <div class="message-modal" id="messageModal">
        <span class="modal-icon" id="modalIcon"></span>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-text" id="modalText"></div>
        <button class="modal-close" onclick="closeModal()">Let's Go!</button>
    </div>

    <div class="achievement-toast" id="achievementToast">
        <div class="toast-header">
            <div class="toast-icon" id="toastIcon"></div>
            <div class="toast-title" id="toastTitle"></div>
        </div>
        <div class="toast-desc" id="toastDesc"></div>
    </div>

    <div class="combo-display" id="comboDisplay"></div>
    <div class="instruction-tooltip" id="instructionTooltip">💡 Drag & throw blocks • Smash into walls or each other!
    </div>

    <script>
        // ── Canvas ────────────────────────────────────────────────────────────
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let W = window.innerWidth, H = window.innerHeight;

        function resizeCanvas() {
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W; canvas.height = H;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ── Config ────────────────────────────────────────────────────────────
        const CFG = {
            friction: 0.97,
            bounce: 0.50,   // wall bounce coefficient
            bbBounce: 0.58,   // block-on-block bounce
            minVel: 2.5,    // min speed to register as a wall impact
            hitThresh: 8,      // min speed to deal wall damage (a real throw)
            tapDmg: 20,     // 5 taps × 20 = 100 → shatter
            throwDmg: 20,     // same per hard wall/block hit
            bbDmgThresh: 5,    // min relative speed for block-block damage
            flashMs: 80,
            colors: ['#f87171', '#fb923c', '#fbbf24', '#a78bfa', '#60a5fa', '#34d399'],
            cathartic: { gravity: 0.58, particles: 28 },
            zen: { gravity: 0.26, particles: 14 },
        };

        // ── State ─────────────────────────────────────────────────────────────
        const S = {
            blocks: [], particles: [], shards: [],
            impacts: 0, shatters: 0, tension: 0,
            mode: 'cathartic', sound: true,
            drag: null,
            mx: 0, my: 0, mpx: 0, mpy: 0,
            achievements: new Set(),
            combo: 0, lastShatter: 0,
        };

        // ── Audio ─────────────────────────────────────────────────────────────
        const AC = new (window.AudioContext || window.webkitAudioContext)();
        function resumeAC() { if (AC.state === 'suspended') AC.resume(); }

        function beep(f0, f1, dur, vol) {
            if (!S.sound) return;
            resumeAC();
            const t = AC.currentTime;
            const o = AC.createOscillator(), g = AC.createGain();
            o.frequency.setValueAtTime(f0, t);
            o.frequency.exponentialRampToValueAtTime(f1, t + dur);
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.04);
            o.connect(g).connect(AC.destination);
            o.start(t); o.stop(t + dur + 0.08);
        }

        function playImpact(sp) { beep(80, 25, 0.2, Math.min(sp * 0.02, 0.4)); }
        function playTap() { beep(260, 130, 0.1, 0.2); }
        function playBlockHit() { beep(180, 70, 0.15, 0.28); }

        function playShatter() {
            if (!S.sound) return;
            resumeAC();
            const t = AC.currentTime;
            const sz = AC.sampleRate * 0.28;
            const buf = AC.createBuffer(1, sz, AC.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < sz; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / sz * 3.5);
            const src = AC.createBufferSource(), gn = AC.createGain(), fl = AC.createBiquadFilter();
            src.buffer = buf; fl.type = 'highpass'; fl.frequency.value = 700;
            gn.gain.setValueAtTime(0.5, t); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
            src.connect(fl).connect(gn).connect(AC.destination);
            src.start(t);
        }

        // ── Block ─────────────────────────────────────────────────────────────
        class Block {
            constructor(x, y, size, color) {
                this.x = x; this.y = y;
                this.w = size; this.h = size;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = 0;
                this.rot = 0;
                this.avel = (Math.random() - 0.5) * 0.04;
                this.drag = false;
                this.hp = 100;
                this.cracks = [];
                this.dead = false;
                this.bbCool = 0;  // block-block cooldown (frames)
            }

            get cx() { return this.x + this.w * 0.5; }
            get cy() { return this.y + this.h * 0.5; }

            update() {
                if (this.dead) return;
                if (this.bbCool > 0) this.bbCool--;

                if (this.drag) {
                    const tx = S.mx - this.w * 0.5, ty = S.my - this.h * 0.5;
                    this.vx = (tx - this.x) * 0.22;
                    this.vy = (ty - this.y) * 0.22;
                    this.x += this.vx; this.y += this.vy;
                    return;
                }

                this.vy += CFG[S.mode].gravity;
                this.vx *= CFG.friction;
                this.x += this.vx; this.y += this.vy;
                this.rot += this.avel;
                this.avel *= 0.985;

                this.wallCollide();
            }

            wallCollide() {
                let speed = 0, pt = null;

                // Floor — use H (CSS pixels), NOT canvas.height
                if (this.y + this.h >= H) {
                    this.y = H - this.h;
                    speed = Math.abs(this.vy);
                    pt = { x: this.cx, y: H };
                    this.vy *= -CFG.bounce;
                    if (Math.abs(this.vy) < 2) this.vy = 0;
                    this.vx *= 0.80;
                    this.avel = this.vx * 0.025;
                }
                // Ceiling
                if (this.y <= 0) {
                    this.y = 0;
                    speed = Math.abs(this.vy);
                    pt = { x: this.cx, y: 0 };
                    this.vy *= -CFG.bounce;
                }
                // Right wall
                if (this.x + this.w >= W) {
                    this.x = W - this.w;
                    speed = Math.abs(this.vx);
                    pt = { x: W, y: this.cy };
                    this.vx *= -CFG.bounce;
                    this.avel = (Math.random() - 0.5) * 0.12;
                }
                // Left wall
                if (this.x <= 0) {
                    this.x = 0;
                    speed = Math.abs(this.vx);
                    pt = { x: 0, y: this.cy };
                    this.vx *= -CFG.bounce;
                    this.avel = (Math.random() - 0.5) * 0.12;
                }

                if (speed > CFG.minVel && pt) {
                    S.impacts++; updateUI();
                    playImpact(speed);
                    spawnParts(pt.x, pt.y, this.color, Math.min(Math.floor(speed * 1.4), 14));
                    if (speed > CFG.hitThresh) {
                        this.damage(CFG.throwDmg, pt);
                    }
                }
            }

            // AABB overlap
            overlaps(o) {
                return this.x < o.x + o.w && this.x + this.w > o.x &&
                    this.y < o.y + o.h && this.y + this.h > o.y;
            }

            resolveWith(o) {
                if (this.dead || o.dead) return;
                if (!this.overlaps(o)) return;
                if (this.bbCool > 0 || o.bbCool > 0) return;

                const ox = Math.min(this.x + this.w - o.x, o.x + o.w - this.x);
                const oy = Math.min(this.y + this.h - o.y, o.y + o.h - this.y);

                if (ox < oy) {
                    // Horizontal
                    const sign = this.cx < o.cx ? 1 : -1;
                    this.x -= sign * ox * 0.5;
                    o.x += sign * ox * 0.5;
                    const relV = Math.abs(this.vx - o.vx);
                    const tmp = this.vx;
                    this.vx = o.vx * CFG.bbBounce;
                    o.vx = tmp * CFG.bbBounce;
                    this.avel += (Math.random() - .5) * 0.1;
                    o.avel += (Math.random() - .5) * 0.1;
                    if (relV > CFG.bbDmgThresh) {
                        const pt = { x: (this.x + this.w + o.x) * 0.5, y: (this.cy + o.cy) * 0.5 };
                        this.damage(CFG.throwDmg, pt);
                        o.damage(CFG.throwDmg, pt);
                        playBlockHit();
                        spawnParts(pt.x, pt.y, this.color, 12);
                        spawnParts(pt.x, pt.y, o.color, 12);
                        flashScreen(pt.x, pt.y);
                    } else { playImpact(relV); }
                } else {
                    // Vertical
                    const sign = this.cy < o.cy ? 1 : -1;
                    this.y -= sign * oy * 0.5;
                    o.y += sign * oy * 0.5;
                    const relV = Math.abs(this.vy - o.vy);
                    const tmp = this.vy;
                    this.vy = o.vy * CFG.bbBounce;
                    o.vy = tmp * CFG.bbBounce;
                    if (relV > CFG.bbDmgThresh) {
                        const pt = { x: (this.cx + o.cx) * 0.5, y: (this.y + this.h + o.y) * 0.5 };
                        this.damage(CFG.throwDmg, pt);
                        o.damage(CFG.throwDmg, pt);
                        playBlockHit();
                        spawnParts(pt.x, pt.y, this.color, 12);
                        spawnParts(pt.x, pt.y, o.color, 12);
                        flashScreen(pt.x, pt.y);
                    } else { playImpact(relV); }
                }

                this.bbCool = 10;
                o.bbCool = 10;
            }

            damage(amount, pt) {
                if (this.dead) return;
                this.hp -= amount;
                // Crack stages: 80 / 60 / 40 / 20 hp
                const want = [80, 60, 40, 20].filter(t => this.hp <= t).length;
                while (this.cracks.length < want) {
                    this.cracks.push({
                        x1: .1 + Math.random() * .8, y1: .1 + Math.random() * .8,
                        x2: .1 + Math.random() * .8, y2: .1 + Math.random() * .8,
                    });
                }
                if (this.hp <= 0) this.shatter(pt);
            }

            tapDamage(pt) {
                if (this.dead) return;
                S.impacts++; updateUI();
                playTap();
                spawnParts(pt.x, pt.y, this.color, 10);
                this.vx += (Math.random() - .5) * 5;
                this.vy += (Math.random() - .5) * 4;
                this.avel += (Math.random() - .5) * 0.08;
                this.damage(CFG.tapDmg, pt);
            }

            shatter(pt) {
                if (this.dead) return;
                this.dead = true;
                S.shatters++;
                S.tension = Math.min(100, S.tension + 7);
                playShatter();
                flashScreen(pt ? pt.x : this.cx, pt ? pt.y : this.cy);
                const n = CFG[S.mode].particles;
                for (let i = 0; i < n; i++) S.shards.push(new Shard(this.cx, this.cy, this.color));
                explosion(this.cx, this.cy, this.color);
                updateUI(); checkAchievements(); checkCombo();
            }

            contains(px, py) {
                const dx = px - this.cx, dy = py - this.cy;
                const c = Math.cos(-this.rot), sn = Math.sin(-this.rot);
                const rx = dx * c - dy * sn, ry = dx * sn + dy * c;
                return Math.abs(rx) <= this.w / 2 && Math.abs(ry) <= this.h / 2;
            }

            draw() {
                if (this.dead) return;
                ctx.save();
                ctx.translate(this.cx, this.cy);
                ctx.rotate(this.rot);
                const hw = this.w / 2, hh = this.h / 2;

                // Dark body
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(-hw, -hh, this.w, this.h);

                // Color fill — NO shadowBlur (causes glitching)
                ctx.globalAlpha = 0.42;
                ctx.fillStyle = this.color;
                ctx.fillRect(-hw, -hh, this.w, this.h);
                ctx.globalAlpha = 1;

                // Outer border
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.strokeRect(-hw, -hh, this.w, this.h);

                // Inner highlight
                ctx.strokeStyle = this.color + '44';
                ctx.lineWidth = 1;
                ctx.strokeRect(-hw + 5, -hh + 5, this.w - 10, this.h - 10);

                // Cracks
                if (this.cracks.length) {
                    ctx.strokeStyle = this.color + 'BB';
                    ctx.lineWidth = 2;
                    for (const c of this.cracks) {
                        ctx.beginPath();
                        ctx.moveTo(c.x1 * this.w - hw, c.y1 * this.h - hh);
                        ctx.lineTo(c.x2 * this.w - hw, c.y2 * this.h - hh);
                        ctx.stroke();
                    }
                }

                // HP bar at bottom of block
                const hpF = Math.max(0, this.hp / 100);
                ctx.fillStyle = 'rgba(0,0,0,.55)';
                ctx.fillRect(-hw, hh - 7, this.w, 5);
                ctx.fillStyle = hpF > .6 ? '#10b981' : hpF > .3 ? '#fbbf24' : '#f87171';
                ctx.fillRect(-hw, hh - 7, this.w * hpF, 5);

                ctx.restore();
            }
        }

        // ── Shard ─────────────────────────────────────────────────────────────
        class Shard {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const a = Math.random() * Math.PI * 2, sp = Math.random() * 15 + 6;
                this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
                this.sz = Math.random() * 7 + 3;
                this.rot = Math.random() * Math.PI * 2;
                this.avel = (Math.random() - .5) * .28;
                this.life = 1;
            }
            update() {
                this.vy += CFG[S.mode].gravity * .5;
                this.vx *= .98; this.vy *= .98;
                this.x += this.vx; this.y += this.vy;
                this.rot += this.avel; this.life -= .014;
                if (this.y + this.sz > H) { this.y = H - this.sz; this.vy *= -.3; this.vx *= .8; }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y); ctx.rotate(this.rot);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(-this.sz / 2, -this.sz / 2); ctx.lineTo(this.sz / 2, -this.sz / 3);
                ctx.lineTo(this.sz / 3, this.sz / 2); ctx.lineTo(-this.sz / 3, this.sz / 3);
                ctx.closePath(); ctx.fill();
                ctx.restore();
            }
        }

        // ── Particles ─────────────────────────────────────────────────────────
        function spawnParts(x, y, color, n) {
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2, sp = Math.random() * 5 + 1;
                S.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, sz: Math.random() * 2.5 + 1, color, life: 1 });
            }
        }
        function explosion(x, y, color) {
            for (let i = 0; i < 38; i++) {
                const a = Math.random() * Math.PI * 2, sp = Math.random() * 13 + 4;
                S.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, sz: Math.random() * 4.5 + 1.5, color, life: 1 });
            }
        }
        function drawParticles() {
            for (let i = S.particles.length - 1; i >= 0; i--) {
                const p = S.particles[i];
                p.vy += .18; p.x += p.vx; p.y += p.vy;
                p.vx *= .97; p.vy *= .97; p.life -= .023;
                if (p.life <= 0) { S.particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ── Visual FX ─────────────────────────────────────────────────────────
        function flashScreen(x, y) {
            const f = document.getElementById('flashOverlay');
            f.style.setProperty('--fx', (x / W * 100) + '%');
            f.style.setProperty('--fy', (y / H * 100) + '%');
            f.style.opacity = '.72';
            clearTimeout(flashScreen._t);
            flashScreen._t = setTimeout(() => f.style.opacity = '0', CFG.flashMs);
        }

        // ── UI ────────────────────────────────────────────────────────────────
        function updateUI() {
            document.getElementById('impactCounter').textContent = S.impacts;
            document.getElementById('shatterCounter').textContent = S.shatters;
            const pct = Math.min(100, Math.round(S.tension));
            document.getElementById('tensionPct').textContent = pct;
            document.getElementById('tensionFill').style.width = pct + '%';
            const msgs = ['Spawn a block to begin', 'Starting to release...', 'Finding your rhythm...', 'Building momentum...', 'Significant release!', 'Deep catharsis!', 'Almost complete...', 'Full release achieved!'];
            document.getElementById('releaseMsg').textContent = msgs[Math.min(Math.floor(pct / 12.5), msgs.length - 1)];
            if (pct >= 100 && !S.achievements.has('complete')) {
                S.achievements.add('complete');
                showModal('✨', 'Full Release Achieved', 'You\'ve discharged a full cycle of tension. Take a breath and notice the calm.');
            }
        }

        function checkAchievements() {
            if (S.shatters === 1) showToast('🎯', 'First Impact', 'Your journey of release begins');
            if (S.shatters === 10) showToast('💥', 'Building Momentum', '10 blocks shattered!');
            if (S.shatters === 25) showToast('⚡', 'Cathartic Master', '25 releases — you\'re in the zone!');
        }

        function checkCombo() {
            const now = Date.now();
            S.combo = now - S.lastShatter < 1200 ? S.combo + 1 : 1;
            S.lastShatter = now;
            if (S.combo >= 3) {
                const el = document.getElementById('comboDisplay');
                el.textContent = S.combo + '× COMBO!';
                el.classList.add('show');
                clearTimeout(checkCombo._t);
                checkCombo._t = setTimeout(() => el.classList.remove('show'), 900);
            }
        }

        function showModal(icon, title, text) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('messageModal').classList.add('show');
        }
        function closeModal() { document.getElementById('messageModal').classList.remove('show'); }

        function showToast(icon, title, desc) {
            document.getElementById('toastIcon').textContent = icon;
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastDesc').textContent = desc;
            const t = document.getElementById('achievementToast');
            t.classList.add('show');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => t.classList.remove('show'), 3200);
        }

        // ── Spawn ─────────────────────────────────────────────────────────────
        function spawnBlock() {
            const sz = 60 + Math.random() * 60;
            const color = CFG.colors[Math.floor(Math.random() * CFG.colors.length)];
            const x = sz * 0.5 + Math.random() * (W - sz);
            S.blocks.push(new Block(x, -sz, sz, color));
        }
        function spawnMultiple() { for (let i = 0; i < 5; i++) setTimeout(spawnBlock, i * 110); }
        function clearAll() {
            S.blocks.forEach(b => { if (!b.dead) b.shatter(null); });
            S.blocks = [];
        }

        // ── Input ─────────────────────────────────────────────────────────────
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const s = e.touches ? e.touches[0] : e;
            return { x: s.clientX - r.left, y: s.clientY - r.top };
        }

        const INP = { down: false, pt: null, t: 0, tapB: null };

        canvas.addEventListener('pointerdown', e => {
            e.preventDefault();
            const p = getPos(e);
            INP.down = true; INP.pt = p; INP.t = performance.now(); INP.tapB = null;
            S.mpx = S.mx = p.x; S.mpy = S.my = p.y;

            for (let i = S.blocks.length - 1; i >= 0; i--) {
                const b = S.blocks[i];
                if (!b.dead && b.contains(p.x, p.y)) {
                    INP.tapB = b; S.drag = b; b.drag = true;
                    S.blocks.splice(i, 1); S.blocks.push(b);
                    document.body.classList.add('dragging');
                    break;
                }
            }
        }, { passive: false });

        canvas.addEventListener('pointermove', e => {
            e.preventDefault();
            const p = getPos(e);
            S.mpx = S.mx; S.mpy = S.my;
            S.mx = p.x; S.my = p.y;
            if (INP.tapB && INP.pt) {
                if (Math.hypot(p.x - INP.pt.x, p.y - INP.pt.y) > 12) INP.tapB = null;
            }
        }, { passive: false });

        function onUp(e) {
            e.preventDefault();
            const p = getPos(e);
            const dt = performance.now() - INP.t;
            const dx = INP.pt ? p.x - INP.pt.x : 0;
            const dy = INP.pt ? p.y - INP.pt.y : 0;
            const tap = dt < 230 && Math.hypot(dx, dy) < 12;

            if (tap && INP.tapB && !INP.tapB.dead) INP.tapB.tapDamage(p);

            if (S.drag) {
                S.drag.vx = (S.mx - S.mpx) * 2.8;
                S.drag.vy = (S.my - S.mpy) * 2.8;
                S.drag.drag = false; S.drag = null;
            }
            INP.down = false; INP.tapB = null;
            document.body.classList.remove('dragging');
        }
        canvas.addEventListener('pointerup', onUp, { passive: false });
        canvas.addEventListener('pointercancel', onUp, { passive: false });

        // ── Buttons ───────────────────────────────────────────────────────────
        document.getElementById('spawnBtn').addEventListener('click', spawnBlock);
        document.getElementById('spawn5Btn').addEventListener('click', spawnMultiple);
        document.getElementById('clearBtn').addEventListener('click', clearAll);
        document.getElementById('soundBtn').addEventListener('click', e => {
            S.sound = !S.sound;
            e.currentTarget.querySelector('i').className = S.sound ? 'fas fa-volume-high' : 'fas fa-volume-xmark';
        });
        document.getElementById('catharcticBtn').addEventListener('click', () => {
            S.mode = 'cathartic';
            document.getElementById('catharcticBtn').classList.add('active');
            document.getElementById('zenBtn').classList.remove('active');
        });
        document.getElementById('zenBtn').addEventListener('click', () => {
            S.mode = 'zen';
            document.getElementById('zenBtn').classList.add('active');
            document.getElementById('catharcticBtn').classList.remove('active');
        });

        // ── Game loop ─────────────────────────────────────────────────────────
        let raf;
        function loop() {
            // Dark background fill (alpha:false = no transparency, much faster)
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, W, H);

            // Update physics
            for (const b of S.blocks) b.update();

            // Block-block collisions
            for (let i = 0; i < S.blocks.length; i++)
                for (let j = i + 1; j < S.blocks.length; j++)
                    S.blocks[i].resolveWith(S.blocks[j]);

            // Draw blocks
            for (const b of S.blocks) b.draw();

            // Shards
            for (let i = S.shards.length - 1; i >= 0; i--) {
                const sh = S.shards[i];
                sh.update(); sh.draw();
                if (sh.life <= 0) S.shards.splice(i, 1);
            }

            // Particles
            drawParticles();

            // Remove dead blocks
            S.blocks = S.blocks.filter(b => !b.dead);

            // Tension decay
            if (S.tension > 0) { S.tension = Math.max(0, S.tension - 0.07); updateUI(); }

            raf = requestAnimationFrame(loop);
        }

        // ── Init ──────────────────────────────────────────────────────────────
        function init() {
            setTimeout(() => showModal('💪', 'Welcome to Kinetic Release',
                'Smash each block 5 times, or throw it hard against a wall or another block to shatter it. Spawn multiple blocks and crash them together!'), 600);
            const tip = document.getElementById('instructionTooltip');
            setTimeout(() => {
                tip.classList.add('show');
                setTimeout(() => tip.classList.remove('show'), 5500);
            }, 5500);
            if (raf) cancelAnimationFrame(raf);
            raf = requestAnimationFrame(loop);
        }

        window.addEventListener('load', init);
    </script>
</body>

</html>
